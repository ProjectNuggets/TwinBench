name: Website

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build minimal pages site
        run: |
          mkdir -p _site
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>TwinBench: Benchmark for Persistent AI Systems</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 48px auto; max-width: 760px; padding: 0 20px; line-height: 1.55; color: #1f2937; }
              h1 { line-height: 1.1; margin-bottom: 12px; }
              p, li { font-size: 18px; }
              code { background: #f3f4f6; padding: 2px 6px; border-radius: 4px; }
              a { color: #0f766e; text-decoration: none; }
              a:hover { text-decoration: underline; }
            </style>
          </head>
          <body>
            <h1>TwinBench: Benchmark for Persistent AI Systems</h1>
            <p>TwinBench evaluates persistent AI behavior over time: memory retention, identity consistency, cross-context coherence, task continuity, and personalization gain.</p>
            <p>This Pages site is intentionally minimal. The canonical benchmark surface lives in the repository.</p>
            <ul>
              <li><a href="https://github.com/ProjectNuggets/TwinBench/blob/main/README.md">README</a></li>
              <li><a href="https://github.com/ProjectNuggets/TwinBench/blob/main/SPEC.md">Specification</a></li>
              <li><a href="https://github.com/ProjectNuggets/TwinBench/blob/main/METRICS.md">Metrics</a></li>
              <li><a href="https://github.com/ProjectNuggets/TwinBench/blob/main/SCENARIOS.md">Scenarios</a></li>
              <li><a href="https://github.com/ProjectNuggets/TwinBench/blob/main/results/reference-example-v1.json">Reference Example Result</a></li>
            </ul>
          </body>
          </html>
          EOF
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
